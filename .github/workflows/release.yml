name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Build cross-platform binaries ─────────────────────────────────────────
  binaries:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build Tailwind CSS
        run: npm ci && npm run build:css

      - name: Generate templ components
        run: go run github.com/a-h/templ/cmd/templ@latest generate -path ./internal/certdeck/views

      - name: Build binary
        env:
          GOOS:        ${{ matrix.goos }}
          GOARCH:      ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${{ github.ref_name }}"
          OUTFILE="unifi-cert-smash-deck-${VERSION}-${{ matrix.suffix }}${{ matrix.ext || '' }}"
          go build \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "${OUTFILE}" \
            ./cmd/unificert
          echo "OUTFILE=${OUTFILE}" >> "$GITHUB_ENV"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.suffix }}
          path: ${{ env.OUTFILE }}
          retention-days: 1

  # ── NSIS Windows installer ─────────────────────────────────────────────────
  installer:
    name: Windows installer (NSIS)
    runs-on: windows-latest
    needs: binaries

    steps:
      - uses: actions/checkout@v4

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: bin-windows-amd64
          path: installer/

      - name: Rename binary for NSIS
        shell: pwsh
        run: |
          $src = Get-ChildItem installer\unifi-cert-smash-deck-*.exe | Select-Object -First 1
          Rename-Item $src.FullName "installer\unifi-cert-smash-deck.exe"

      - name: Build NSIS installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          & 'C:\Program Files (x86)\NSIS\makensis.exe' `
            /DVERSION=$version `
            installer\windows.nsi
          $installer = Get-ChildItem installer\*-setup.exe | Select-Object -First 1
          echo "INSTALLER=$($installer.FullName)" >> $env:GITHUB_ENV

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-windows-amd64
          path: installer/*-setup.exe
          retention-days: 1

  # ── Docker image ───────────────────────────────────────────────────────────
  docker:
    name: Docker image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [binaries, installer, docker]

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List release assets
        run: ls -lh dist/

      - name: Create checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*
